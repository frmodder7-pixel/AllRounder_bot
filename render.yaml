services:
  - type: web
    name: allrounder-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WARN_LIMIT
        value: "3"
